name: Test Build

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Test basic commands
      run: |
        echo "Hello World"
        uname -a
        whoami
        pwd

    - name: Test apt
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq fakeroot dpkg
        echo "APT OK"
