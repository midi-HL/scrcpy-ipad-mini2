name: Build iOS 12 Deb Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot dpkg ldid

    - name: Set up Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git /opt/theos
        chmod -R 777 /opt/theos

    - name: Download iOS SDK
      run: |
        wget -q https://github.com/theos/sdks/archive/master.tar.gz -O /tmp/sdks.tar.gz
        tar xzf /tmp/sdks.tar.gz -C /tmp/
        mkdir -p /opt/theos/sdks
        cp -r /tmp/sdks-master/iPhoneOS12.4.sdk /opt/theos/sdks/ || true

    - name: Build package
      run: |
        export THEOS=/opt/theos
        export PATH="$THEOS/bin:$PATH"
        cd scrcpy-ios
        make clean || true
        make package FINALPACKAGE=1 DEBUG=0

    - name: Upload deb artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: iOS12-deb-package
        path: scrcpy-ios/packages/*.deb
        retention-days: 90

    - name: Build failure diagnostics
      if: failure()
      run: |
        echo "=== Build failed ==="
        ls -la /opt/theos/ 2>/dev/null || echo "Theos not found"
        ls -la /opt/theos/sdks/ 2>/dev/null || echo "SDKs not found"
        find scrcpy-ios/Sources -name "*.m" -o -name "*.c" | head -20
        cat scrcpy-ios/control
