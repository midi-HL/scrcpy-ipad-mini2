name: Build iOS 12 Deb Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  THEOS: /opt/theos

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot dpkg ldid git curl wget

    - name: Set up Theos
      run: |
        sudo mkdir -p /opt/theos
        sudo chmod 777 /opt/theos
        git clone --recursive https://github.com/theos/theos.git /opt/theos
        chmod -R 777 /opt/theos

    - name: Download iOS SDK
      run: |
        wget -q https://github.com/theos/sdks/archive/master.tar.gz -O /tmp/sdks.tar.gz
        tar xzf /tmp/sdks.tar.gz -C /tmp/
        sudo mkdir -p $THEOS/sdks
        sudo cp -r /tmp/sdks-master/iPhoneOS12.4.sdk $THEOS/sdks/ || true
        sudo cp -r /tmp/sdks-master/iPhoneOS11.2.sdk $THEOS/sdks/ || true
        ls -la $THEOS/sdks/

    - name: Configure environment
      run: |
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "$THEOS/bin" >> $GITHUB_PATH

    - name: Build package
      run: |
        cd scrcpy-ios
        make clean || true
        make package FINALPACKAGE=1 DEBUG=0

    - name: Upload deb artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: iOS12-deb-package
        path: scrcpy-ios/packages/*.deb
        retention-days: 90

    - name: Build failure diagnostics
      if: failure()
      run: |
        echo "=== Build failed ==="
        echo "Checking environment..."
        env | grep -E "THEOS|PATH"
        echo "Checking source files..."
        find scrcpy-ios/Sources -name "*.m" -o -name "*.c" | head -20
        echo "Checking Makefile..."
        head -50 scrcpy-ios/Makefile
        echo "Checking control..."
        cat scrcpy-ios/control
