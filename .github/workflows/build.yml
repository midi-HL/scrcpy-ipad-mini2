name: Build iOS 12 Deb Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq fakeroot dpkg clang

    - name: Set up Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git /opt/theos
        chmod -R 777 /opt/theos

    - name: Set up Theos toolchain
      run: |
        # Create Theos toolchain directory structure
        mkdir -p /opt/theos/toolchain/linux/iphone/bin
        # Symlink system clang to where Theos expects it
        sudo ln -sf /usr/bin/clang /opt/theos/toolchain/linux/iphone/bin/clang
        sudo ln -sf /usr/bin/clang++ /opt/theos/toolchain/linux/iphone/bin/clang++
        ls -la /opt/theos/toolchain/linux/iphone/bin/

    - name: Download iOS SDK
      run: |
        wget -q https://github.com/theos/sdks/archive/master.tar.gz -O /tmp/sdks.tar.gz
        tar xzf /tmp/sdks.tar.gz -C /tmp/
        mkdir -p /opt/theos/sdks
        # Copy iPhoneOS12.4.sdk
        cp -r /tmp/sdks-master/iPhoneOS12.4.sdk /opt/theos/sdks/
        ls -la /opt/theos/sdks/

    - name: Build package
      run: |
        export THEOS=/opt/theos
        export PATH="$THEOS/bin:$PATH"
        cd scrcpy-ios
        make clean || true
        make package FINALPACKAGE=1 DEBUG=0

    - name: Upload deb artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: iOS12-deb-package
        path: scrcpy-ios/packages/*.deb
        retention-days: 90
